<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Script Task 7</title>
</head>
<body>
    <script>
        //=========================
        //Digital Clock 
        //==========================

        function showTime() {
    let now = new Date();   

    let hours = now.getHours();
    let minutes = now.getMinutes();
    let seconds = now.getSeconds();

    console.log(hours + ":" + minutes + ":" + seconds);
}

setInterval(showTime, 1000);

//=========================
// Age Calculator
//=========================

let birthYear = 1998;   

let currentYear = new Date().getFullYear();  

let age = currentYear - birthYear;

console.log("Your age is " + age);

//==========================
// Website Loading Simulation
//==========================

console.log("Website Loading...");

setTimeout(() => {
    console.log("Website Loaded Successfully");
}, 3000);

//==============================
// Automatic Notification System
// =============================

console.log("Reminder started...");

let reminder = setInterval(function() {
    console.log("Take a short break");
}, 5000); 

setTimeout(function() {
    clearInterval(reminder);
    console.log("Reminder stopped");
}, 20000);

//=================================
// Online Order Status System
//=================================

console.log("Order Placed");

setTimeout(function() {
    console.log("Order Preparing");
}, 2000);

setTimeout(function() {
    console.log("Out for Delivery");
}, 5000);

setTimeout(function() {
    console.log("Order Delivered");
}, 8000);

//===============================
// API Data Viewer
//===============================

fetch("https://jsonplaceholder.typicode.com/todos/")
  .then(response => response.json())   
  .then(data => {
      data.forEach(todo => {
          console.log(todo.title);    
      });
  })
  .catch(error => console.log("Error:", error));

  //=============================
  // Completed Task Filter
  //=============================

  fetch("https://jsonplaceholder.typicode.com/todos/")
  .then(response => response.json())
  .then(data => {
      data
        .filter(todo => todo.completed === true) 
        .forEach(todo => {
            console.log(todo.title);
        });
  })
  .catch(error => console.log("Error:", error));

  //==========================
  // API Error Handling
  //==========================

  fetch("https://jsonplaceholder.typicode.com/todos/")
  .then(response => response.json())
  .then(data => {
      console.log("Data received");
  })
  .catch(error => {
      console.log("Server Error");
  })
  .finally(() => {
      console.log("Process Completed");
  });

  //=============================
  // Meeting Countdown Timer
  //=============================

let time = 10;

let timer = setInterval(function() {
    console.log(time);
    time--;

    if (time < 0) {
        clearInterval(timer);
        console.log("Meeting Started");
    }
}, 1000);

//=========================
// Login Session Timeout
//=========================

console.log("User Logged In");

setTimeout(function() {
    console.log("Session Expired. Please Login Again");
}, 10000);

    </script>
</body>
</html>
