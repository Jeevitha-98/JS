<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Website</title>
</head>

    <link rel="stylesheet" href="responsive.css">
</head>

<header>
    <div class="logo">Yazh Bakes</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Prices</a>
        <a href="#">Customization</a>
        <a href="#">Contact</a>
    </nav>
</header>
<section class="hero">
    <div class="hero-content">
        <h1>Sweet Moments with Yazh Bakes</h1>
        <p>Because every celebration deserves a perfect cake</p>
        <button>Order Now</button>
    </div>
</section>
<section class="section">
    <h2>Recipes</h2>
    <div class="card-container">
        <div class="card">
            <img src="./Assests/brownie.jpg" alt="">
            <p>Brownie</p>
        </div>
        <div class="card">
            <img src="./Assests/chocolate cake.jpg" alt="">
            <p>Cakes</p>
        </div>
        <div class="card">
            <img src="./Assests/Coockies.jpg" alt="">
            <p>Coockies</p>
        </div>
    </div>
    
</section>
<section class="section light">
    <h2> Prices </h2>
    <div class="package-container">
        <div class="package">
            <h3>Basic</h3>
            <p>3 Days</p>
            <h4>$39</h4>
            <button>Select</button>
        </div>

        <div class="package">
            <h3>Standard</h3>
            <p>5 Days</p>
            <h4>$50</h4>
            <button>Select</button>
        </div>

        <div class="package">
            <h3>Premium</h3>
            <p>7 Days</p>
            <h4>$100</h4>
            <button>Select</button>
        </div>
    </div>
</section>
<section class="section">
    <h2>Customization</h2>
    <div class="gallery">
        <img src="./Assests/Cake 1.jpg">
        <img src="./Assests/cake 2.jpg">
        <img src="./Assests/cake 3.jpg">
        <img src="./Assests/Cake 4.jpg">
        <img src="./Assests/cake 5.jpg">
        <img src="./Assests/cake 6.jpg">
    </div>
</section>
<section class="section light">
    <h2>Contact Us</h2>
    <form class="contact-form">
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
        <textarea placeholder="Message"></textarea>
        <button type="submit">Send</button>
    </form>
</section>
<footer>
    © 2025 Yazh Bakes
</footer>
</body>
</html>
